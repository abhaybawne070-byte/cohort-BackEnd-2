<body class="font-body selection:bg-primary selection:text-on-primary">
<!-- Suppression of Navigation Shell for focused journey -->
<main class="min-h-screen flex items-center justify-center relative overflow-hidden px-6 py-20">
<!-- Subtle Backdrop Graphic -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="grain-overlay absolute inset-0 opacity-30 scale-110" data-alt="extreme close-up of organic heritage grains scattered on a dark slate surface with dramatic side lighting and deep shadows"></div>
<div class="absolute inset-0 bg-gradient-to-b from-background via-transparent to-background"></div>
</div>
<!-- Registration Container -->
<div class="relative z-10 w-full max-w-[540px]">
<div class="text-center mb-16">
<h1 class="font-headline text-5xl md:text-6xl tracking-tighter text-primary mb-4">SNITCH</h1>
<p class="font-label text-[10px] tracking-[0.4em] uppercase text-on-surface-variant opacity-60">Join the collective of discerning harvesters</p>
</div>
<div class="bg-surface-container-low/40 backdrop-blur-3xl p-10 md:p-16 rounded-lg shadow-2xl">
<form action="#" class="space-y-10" method="POST">
<!-- Full Name -->
<div class="group relative">
<label class="block font-label text-[10px] tracking-widest text-outline uppercase mb-2 group-focus-within:text-primary transition-colors" for="name">Full Name</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 text-on-surface focus:ring-0 focus:border-primary transition-all duration-500 font-headline text-xl placeholder:text-surface-container-highest" id="name" name="name" placeholder="Arthur P. Morgan" required="" type="text"/>
</div>
<!-- Email Address -->
<div class="group relative">
<label class="block font-label text-[10px] tracking-widest text-outline uppercase mb-2 group-focus-within:text-primary transition-colors" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 text-on-surface focus:ring-0 focus:border-primary transition-all duration-500 font-headline text-xl placeholder:text-surface-container-highest" id="email" name="email" placeholder="curator@theharvest.com" required="" type="email"/>
</div>
<!-- Contact Number -->
<div class="group relative">
<label class="block font-label text-[10px] tracking-widest text-outline uppercase mb-2 group-focus-within:text-primary transition-colors" for="phone">Contact Number</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 text-on-surface focus:ring-0 focus:border-primary transition-all duration-500 font-headline text-xl placeholder:text-surface-container-highest" id="phone" name="phone" placeholder="+1 (202) 555-0192" type="tel"/>
</div>
<!-- Password -->
<div class="group relative">
<label class="block font-label text-[10px] tracking-widest text-outline uppercase mb-2 group-focus-within:text-primary transition-colors" for="password">Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 text-on-surface focus:ring-0 focus:border-primary transition-all duration-500 font-headline text-xl placeholder:text-surface-container-highest" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
<!-- Seller Toggle -->
<div class="flex items-center justify-between pt-4">
<div class="space-y-1">
<span class="block font-label text-sm text-on-surface">Become a Merchant</span>
<span class="block font-label text-[10px] text-on-surface-variant/60 uppercase tracking-wider">Access the Seller Guild dashboard</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" name="is_seller" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-on-surface after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
<!-- Submit Action -->
<div class="pt-8">
<button class="w-full py-5 px-8 bg-gradient-to-r from-primary to-primary-container text-on-primary font-label text-xs tracking-[0.3em] uppercase font-bold rounded-md hover:scale-[1.02] active:scale-[0.98] transition-all duration-500 flex justify-center items-center gap-3" type="submit">
                            Initiate Membership
                            <span class="material-symbols-outlined text-sm">arrow_right_alt</span>
</button>
</div>
</form>
<div class="mt-12 text-center">
<p class="font-label text-[10px] tracking-widest text-on-surface-variant/40 uppercase">
                        Already part of the heritage? 
                        <a class="text-primary hover:text-primary-fixed ml-2 transition-colors" href="#">Sign In</a>
</p>
</div>
</div>
<!-- Minimalist Footer Detail -->
<div class="mt-16 text-center space-y-4">
<div class="flex justify-center items-center gap-8 opacity-30 grayscale contrast-150">
<img class="h-6 w-auto" data-alt="minimalist botanical logo icon of a single wheat stalk on dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1RN63gl_XRaRZK2GPm5S4hpoZKbt6ymBSGOTKyLmTP7cpTgwB-NCQBoCm0t3VRmbW1r5O3sQSAkuoBj6U1c_KLlXZ_Rjzv7SIbnZufpiGRpLG5LTCtO6FliZ1NkiYczpuHgPzmJz_2UY7LcID1N6ojuHofQ206pPEWKlty0BOYa0jJeAlgOA3Xb3U3YFE2c14I29_pnzlk5KU-SgQBlxmZm8m-65L4dYVPsE7uUx2HF-l7NyvbSkM68w_ZO1FQSH-lpvKcjDyIUc"/>
<img class="h-6 w-auto" data-alt="minimalist abstract geometric logo mark of a circle and line in gold" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5w3f8lL_1Y2fWMfZXLael0nCSJTE00tZA2pHhPVs2UmNkm9HTYoiZJ8BjFgNUZWTD_aVu6Zvjv_PInxaPJnRThW7wLO6ZASAiaSlGFSxSYKNdKJ8IxXT_Ne9u3UKjfJU7uroSx9O94MQUNzqj2WTTsJNYDy5TRlt9rLQ4kDfO6hcJ2E57RKgTITaCKV1l4ELtTOp1cZ9keqYmfHpYy_upJF7Ogf5GVLjJjQrmbUIQdB4YSAWAA8zxOeitzZRzrCsOVjYWRceRDkk"/>
</div>
<p class="font-label text-[9px] tracking-[0.5em] text-on-surface-variant/30 uppercase">The Art of the Harvest © 2024</p>
</div>
</div>
</main>
<!-- Separation logic: tonal-depth-shift used via the dark container vs background -->
</body></html>
